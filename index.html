<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>블로그 작성 사이트</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <header class="site-header">
    <h1>블로그 작성 사이트</h1>
  </header>

  <main class="generator-page">
    <div class="workspace-layout">
      <form class="generator-form" aria-label="블로그 글 생성 입력">
        <section class="form-section">
          <label for="store-name">가게명</label>
          <input id="store-name" name="storeName" type="text" placeholder="가게명을 입력하세요" />
        </section>

        <section class="form-section">
          <h2>주문 내역</h2>
          <div class="order-grid">
            <input id="order-1" name="order1" type="text" placeholder="주문 내역 1" />
            <input id="order-2" name="order2" type="text" placeholder="주문 내역 2" />
            <input id="order-3" name="order3" type="text" placeholder="주문 내역 3" />
          </div>
        </section>

        <section class="form-section">
          <label for="location-detail">위치</label>
          <textarea id="location-detail" name="locationDetail" placeholder="위치에 대한 내용을 입력하세요"></textarea>
        </section>

        <section class="form-section">
          <label for="interior-detail">내부모습</label>
          <textarea id="interior-detail" name="interiorDetail" placeholder="내부모습에 대한 내용을 입력하세요"></textarea>
        </section>

        <section class="form-section">
          <h2>포함 키워드</h2>
          <div class="keyword-grid">
            <input id="keyword-1" name="keyword1" type="text" placeholder="키워드 1" />
            <input id="keyword-2" name="keyword2" type="text" placeholder="키워드 2" />
            <input id="keyword-3" name="keyword3" type="text" placeholder="키워드 3" />
            <input id="keyword-4" name="keyword4" type="text" placeholder="키워드 4" />
          </div>
        </section>

        <section class="form-section">
          <h2>진행내용</h2>
          <div class="content-list">
            <textarea id="content-1" name="content1" placeholder="진행내용 1"></textarea>
            <textarea id="content-2" name="content2" placeholder="진행내용 2"></textarea>
            <textarea id="content-3" name="content3" placeholder="진행내용 3"></textarea>
            <textarea id="content-4" name="content4" placeholder="진행내용 4"></textarea>
          </div>
        </section>

        <button class="generate-button" type="button">블로그 글 작성하기</button>
      </form>

      <section class="result-section" aria-label="생성된 블로그 글">
        <div class="result-header">
          <h2>작성 결과</h2>
          <span id="character-count">0자</span>
        </div>
        <textarea id="generated-post" readonly placeholder="입력값을 모두 채운 뒤 블로그 글 작성하기를 누르면 결과물이 표시됩니다."></textarea>
      </section>
    </div>
  </main>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
